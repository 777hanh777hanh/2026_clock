<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />

    <link rel="shortcut icon" href="./clock.svg" type="image/x-icon" />

    <link rel="stylesheet" href="style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="clock">
      <div class="numbers">
        <div class="circle" id="hrs" style="--clr: #ff2972"><i></i></div>
        <div class="circle" id="min" style="--clr: #fee800"><i></i></div>
        <div class="circle" id="sec" style="--clr: #04fc43"><i></i></div>
        <span style="--i: 0"><b>12</b></span>
        <span style="--i: 1"><b>1</b></span>
        <span style="--i: 2"><b>2</b></span>
        <span style="--i: 3"><b>3</b></span>
        <span style="--i: 4"><b>4</b></span>
        <span style="--i: 5"><b>5</b></span>
        <span style="--i: 6"><b>6</b></span>
        <span style="--i: 7"><b>7</b></span>
        <span style="--i: 8"><b>8</b></span>
        <span style="--i: 9"><b>9</b></span>
        <span style="--i: 10"><b>10</b></span>
        <span style="--i: 11"><b>11</b></span>
      </div>

      <div id="time">
        <div id="hour" style="--clr: #ff2972">00</div>
        <div id="minutes" style="--clr: #fee800">00</div>
        <div id="seconds" style="--clr: #04fc43">00</div>
        <div id="ampm" style="--clr: #f2f2f2">AM</div>
      </div>
    </div>

    <button type="button" class="modeClock">12 Hour</button>
  </body>
</html>
